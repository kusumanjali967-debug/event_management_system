services:
  # Express Backend Web Service
  - type: web
    name: event-management-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
        generateValue: true

  # React Vite Frontend Static Site
  - type: web
    name: event-management-ui
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: event-management-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
